<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte</title>

<style>

/* ───────── ROOT (même design que login) ───────── */
:root {
    --bg: #0a0a0f;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #f0f0ff;
    --muted: #8888aa;
}

/* ───────── BASE ───────── */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
}

/* ───────── BACKGROUND ANIMÉ ───────── */
body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle at 20% 20%, rgba(108,99,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,101,132,0.10), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(67,233,123,0.08), transparent 50%);
    animation: moveBg 10s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    100% { transform: translate(20px,20px); }
}

/* ───────── TITRE ───────── */
h1 {
    position: absolute;
    top: 40px;
    text-align: center;
    font-size: 18px;
    color: var(--muted);
    animation: fadeDown 1s ease;
}

@keyframes fadeDown {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ───────── CARD ───────── */
.container {
    position: relative;
    z-index: 1;
    width: 380px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(26,26,36,0.6);
    backdrop-filter: blur(18px);

    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);

    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(40px) scale(0.9);}
    to {opacity: 1; transform: translateY(0) scale(1);}
}

/* ───────── TITLE ───────── */
.container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;

    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ───────── INPUTS ───────── */
.input-group {
    position: relative;
    margin: 15px 0;
}

.input-group input {
    width: 100%;
    padding: 12px 40px;
    border-radius: 12px;

    background: var(--card);
    border: 1px solid var(--border);

    color: var(--text);
    outline: none;

    transition: 0.3s;
}

.input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(108,99,255,0.4);
    transform: scale(1.03);
}

/* ───────── BUTTON ───────── */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    border: none;
    border-radius: 12px;

    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-weight: bold;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(108,99,255,0.4);
}

/* ───────── LINK ───────── */
a {
    color: var(--accent3);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* ───────── MESSAGE ───────── */
ul {
    list-style: none;
    margin-bottom: 10px;
    text-align: center;
}

li {
    color: var(--accent3);
}

/* ───────── RESPONSIVE ───────── */
@media (max-width: 420px) {
    .container {
        width: 90%;
    }
}

</style>

</head>

<body>

<h1>Créer un compte pour accéder aux produits</h1>

<div class="container">

<h2>Inscription</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}

<ul>
    {% for msg in messages %}
    <li>{{ msg }}</li>
    {% endfor %}
</ul>
{% endif %}
{% endwith %}

<form method="POST">

```
<div class="input-group">
    <input type="text" name="nom" placeholder="Nom et prénom" required>
</div>

<div class="input-group">
    <input type="password" name="password" placeholder="Mot de passe" required>
</div>

<button type="submit">Créer mon compte</button>
```

</form>

<p style="text-align:center; margin-top:15px; color:#888;">
    Déjà un compte ?
    <a href="/connexion">Se connecter</a>
</p>

</div>

</body>
</html>
