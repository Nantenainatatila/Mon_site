<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation</title>
</head>
<style>
    input,option{
        width: 300px;
        height: 25px;
        border-radius: 10px;
        margin: 10px;
    }
    select{
        width: 300px;
        height: 30px;
        border-radius: 10px;
        margin: 10px;
    }
    .container{
        width: 500px;
        border: solid 2px blue;
        text-align: center;
        margin: auto;
        border-radius: 20px;
        padding: 10px;
    }
    body{
        text-align: center;
        display: flex;
        padding: 50px;
    }

</style>
<body>
    <div class="container">
        <h2>Creation des compte</h2>
        <form action="" method="POST">

            <input type="text" name="nom" placeholder="Nom" required><br><br>
            <select name="role" required>
                <option value="">-- Choisir un rôle --</option>
                <option value="client">Client</option>
                <option value="admin">Admin</option>
            </select><br><br>
        
            <input type="text" name="adresse" placeholder="Adresse" required><br><br>
        
            <input type="text" name="telephone" placeholder="Téléphone" required><br><br>
        
            <input type="password" name="password" placeholder="Mot de passe" required><br><br>
        
            <button type="submit">Créer compte</button>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <ul>
                    {% for msg in messages %}
                        <li style="color:green;">{{ msg }}</li>
                    {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}
        
        </form>
        <br>
        Vous avez déjà un compte?     <a href="/"> Clicquer  Ici  </a>   si vous l'avez
    </div>

</body>
</html>
